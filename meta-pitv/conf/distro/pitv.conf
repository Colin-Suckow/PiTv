require conf/distro/poky.conf

DISTRO_VERSION = "1.0"
DISTRO = "pitv"
DISTRO_NAME = "PiTv"

INIT_MANAGER = "systemd"

# Features not covered by the init-manager include
DISTRO_FEATURES:append = " pam polkit"

# Accepting these licenses probably has implications, but I don't really care
# because this is a small project that's only going to be used by 1-2 people.
LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch commercial"
